name: Mirror GitHub to GitLab

on:
  push:
    branches:
      - develop
      - master
  workflow_dispatch:

concurrency:
  group: mirror-to-gitlab-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check mirror token
        id: check_token
        env:
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GITLAB_MIRROR_TOKEN}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "GITLAB_MIRROR_TOKEN is not set. Skipping mirror."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.check_token.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push branch to GitLab
        if: steps.check_token.outputs.skip != 'true'
        env:
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          set -euo pipefail
          git remote add gitlab-mirror "https://oauth2:${GITLAB_MIRROR_TOKEN}@gitlab.com/acosta.aluiz/of-worklyhub-react.git"
          git push gitlab-mirror "HEAD:${GITHUB_REF_NAME}"
