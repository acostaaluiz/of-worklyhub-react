workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - when: never

stages:
  - sync
  - deploy

default:
  interruptible: true

mirror_to_github:
  stage: sync
  image:
    name: alpine/git:2.47.1
    entrypoint: [""]
  variables:
    GIT_STRATEGY: fetch
    GITHUB_MIRROR_REPOSITORY: acostaaluiz/of-worklyhub-react
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master") && $GITHUB_MIRROR_TOKEN'
  before_script:
    - |
      set -euo pipefail
      : "${GITHUB_MIRROR_REPOSITORY:?GITHUB_MIRROR_REPOSITORY is required}"
      if [ -z "${GITHUB_MIRROR_TOKEN:-}" ]; then
        echo "GITHUB_MIRROR_TOKEN not set. Skipping GitLab -> GitHub mirror."
        exit 0
      fi
      git config --global user.name "gitlab-mirror-bot"
      git config --global user.email "gitlab-mirror-bot@worklyhub.local"
      git remote add github-mirror "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/${GITHUB_MIRROR_REPOSITORY}.git"
  script:
    - |
      set -euo pipefail
      git push github-mirror "HEAD:${CI_COMMIT_BRANCH}"

.gcp-deploy-template:
  stage: deploy
  image:
    name: google/cloud-sdk:slim
    entrypoint: [""]
  before_script:
    - |
      set -euo pipefail

      : "${TARGET_ENV_NAME:?TARGET_ENV_NAME is required}"
      : "${GCP_PROJECT_ID:?GCP_PROJECT_ID is required}"
      : "${GCP_REGION:?GCP_REGION is required}"
      : "${GCP_ARTIFACT_REGISTRY_REPOSITORY:?GCP_ARTIFACT_REGISTRY_REPOSITORY is required}"
      : "${GCP_CLOUD_RUN_SERVICE:?GCP_CLOUD_RUN_SERVICE is required}"
      : "${GCP_SERVICE_ACCOUNT_KEY:?GCP_SERVICE_ACCOUNT_KEY is required}"
      : "${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}"

      export VITE_CURRENCY_LOCALE="${VITE_CURRENCY_LOCALE:-en-US}"
      export VITE_CURRENCY_CODE="${VITE_CURRENCY_CODE:-USD}"
      export VITE_CURRENCY_PRECISION="${VITE_CURRENCY_PRECISION:-2}"
      export VITE_FIREBASE_API_KEY="${VITE_FIREBASE_API_KEY:-}"
      export VITE_FIREBASE_AUTH_DOMAIN="${VITE_FIREBASE_AUTH_DOMAIN:-worklyhub-9735f.firebaseapp.com}"
      export VITE_FIREBASE_PROJECT_ID="${VITE_FIREBASE_PROJECT_ID:-worklyhub-9735f}"
      export VITE_FIREBASE_STORAGE_BUCKET="${VITE_FIREBASE_STORAGE_BUCKET:-worklyhub-9735f.firebasestorage.app}"
      export VITE_FIREBASE_MESSAGING_SENDER_ID="${VITE_FIREBASE_MESSAGING_SENDER_ID:-421430807448}"
      export VITE_FIREBASE_APP_ID="${VITE_FIREBASE_APP_ID:-1:421430807448:web:ccb6d1f098ca558d61f9ed}"

      if [ -f "${GCP_SERVICE_ACCOUNT_KEY}" ]; then
        export GCP_KEY_FILE="${GCP_SERVICE_ACCOUNT_KEY}"
      else
        export GCP_KEY_FILE="${CI_PROJECT_DIR}/gcp-sa-key.json"
        printf '%s' "${GCP_SERVICE_ACCOUNT_KEY}" > "${GCP_KEY_FILE}"
      fi

      gcloud auth activate-service-account --key-file="${GCP_KEY_FILE}"
      gcloud config set project "${GCP_PROJECT_ID}"
      gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      export IMAGE_REPOSITORY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY_REPOSITORY}/${CI_PROJECT_NAME}"
      export IMAGE_URI="${IMAGE_REPOSITORY}:${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
  script:
    - |
      gcloud builds submit "${CI_PROJECT_DIR}" \
        --project "${GCP_PROJECT_ID}" \
        --config "${CI_PROJECT_DIR}/infra/cloudbuild/cloudbuild.frontend.yaml" \
        --substitutions "_IMAGE_URI=${IMAGE_URI},_VITE_API_BASE_URL=${VITE_API_BASE_URL},_VITE_CURRENCY_LOCALE=${VITE_CURRENCY_LOCALE},_VITE_CURRENCY_CODE=${VITE_CURRENCY_CODE},_VITE_CURRENCY_PRECISION=${VITE_CURRENCY_PRECISION},_VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY},_VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN},_VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID},_VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET},_VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID},_VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}"
    - |
      gcloud run deploy "${GCP_CLOUD_RUN_SERVICE}" \
        --project "${GCP_PROJECT_ID}" \
        --region "${GCP_REGION}" \
        --image "${IMAGE_URI}" \
        --platform managed \
        --allow-unauthenticated \
        --quiet
    - |
      SERVICE_URL="$(gcloud run services describe "${GCP_CLOUD_RUN_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format='value(status.url)')"
      printf 'SERVICE_URL=%s\nIMAGE_URI=%s\n' "${SERVICE_URL}" "${IMAGE_URI}" > deploy.env
  after_script:
    - |
      if [ "${GCP_KEY_FILE:-}" = "${CI_PROJECT_DIR}/gcp-sa-key.json" ] && [ -f "${GCP_KEY_FILE}" ]; then
        rm -f "${GCP_KEY_FILE}"
      fi
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      dotenv: deploy.env
    paths:
      - deploy.env

gcp_deploy_develop:
  extends: .gcp-deploy-template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  variables:
    TARGET_ENV_NAME: development
    GCP_PROJECT_ID: $GCP_PROJECT_ID_DEVELOP
    GCP_REGION: $GCP_REGION_DEVELOP
    GCP_ARTIFACT_REGISTRY_REPOSITORY: $GCP_ARTIFACT_REGISTRY_REPOSITORY_DEVELOP
    GCP_CLOUD_RUN_SERVICE: $GCP_CLOUD_RUN_SERVICE_DEVELOP
    GCP_SERVICE_ACCOUNT_KEY: $GCP_SERVICE_ACCOUNT_KEY_DEVELOP
    VITE_API_BASE_URL: https://worklyhub-orchestrator-dev-4njpekm7ca-rj.a.run.app/api/v1
    VITE_CURRENCY_LOCALE: $VITE_CURRENCY_LOCALE_DEVELOP
    VITE_CURRENCY_CODE: $VITE_CURRENCY_CODE_DEVELOP
    VITE_CURRENCY_PRECISION: $VITE_CURRENCY_PRECISION_DEVELOP
    VITE_FIREBASE_API_KEY: $VITE_FIREBASE_API_KEY_DEVELOP
    VITE_FIREBASE_AUTH_DOMAIN: $VITE_FIREBASE_AUTH_DOMAIN_DEVELOP
    VITE_FIREBASE_PROJECT_ID: $VITE_FIREBASE_PROJECT_ID_DEVELOP
    VITE_FIREBASE_STORAGE_BUCKET: $VITE_FIREBASE_STORAGE_BUCKET_DEVELOP
    VITE_FIREBASE_MESSAGING_SENDER_ID: $VITE_FIREBASE_MESSAGING_SENDER_ID_DEVELOP
    VITE_FIREBASE_APP_ID: $VITE_FIREBASE_APP_ID_DEVELOP
  environment:
    name: development
    deployment_tier: development
  resource_group: gcp-development

gcp_deploy_master:
  extends: .gcp-deploy-template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
    - if: '$CI_COMMIT_BRANCH == "master"'
  variables:
    TARGET_ENV_NAME: production
    GCP_PROJECT_ID: $GCP_PROJECT_ID_MASTER
    GCP_REGION: $GCP_REGION_MASTER
    GCP_ARTIFACT_REGISTRY_REPOSITORY: $GCP_ARTIFACT_REGISTRY_REPOSITORY_MASTER
    GCP_CLOUD_RUN_SERVICE: $GCP_CLOUD_RUN_SERVICE_MASTER
    GCP_SERVICE_ACCOUNT_KEY: $GCP_SERVICE_ACCOUNT_KEY_MASTER
    VITE_API_BASE_URL: $VITE_API_BASE_URL_MASTER
    VITE_CURRENCY_LOCALE: $VITE_CURRENCY_LOCALE_MASTER
    VITE_CURRENCY_CODE: $VITE_CURRENCY_CODE_MASTER
    VITE_CURRENCY_PRECISION: $VITE_CURRENCY_PRECISION_MASTER
    VITE_FIREBASE_API_KEY: $VITE_FIREBASE_API_KEY_MASTER
    VITE_FIREBASE_AUTH_DOMAIN: $VITE_FIREBASE_AUTH_DOMAIN_MASTER
    VITE_FIREBASE_PROJECT_ID: $VITE_FIREBASE_PROJECT_ID_MASTER
    VITE_FIREBASE_STORAGE_BUCKET: $VITE_FIREBASE_STORAGE_BUCKET_MASTER
    VITE_FIREBASE_MESSAGING_SENDER_ID: $VITE_FIREBASE_MESSAGING_SENDER_ID_MASTER
    VITE_FIREBASE_APP_ID: $VITE_FIREBASE_APP_ID_MASTER
  environment:
    name: production
    deployment_tier: production
  resource_group: gcp-production
